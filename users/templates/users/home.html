<!DOCTYPE html>
<html>
<head>
    <title>Home</title>

    <style>
        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #c0392b;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <h1>Welcome {{ user.username }}</h1>

    <a href="/api/logout/">
        <button class="logout-btn">Logout</button>
    </a>

</body>
</html>
